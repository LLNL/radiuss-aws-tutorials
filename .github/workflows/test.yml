name: CloudFormation Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write   # Required to request OIDC token
  contents: read

jobs:
  taskcat-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-duration-seconds: 900

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install cfn-lint
        run: pip install cfn-lint

      - name: Run cfn-lint
        run: cfn-lint dockerized-tutorial-template.yml

      - name: Install TaskCat
        run: |
          pip install taskcat

      - name: Run TaskCat lint
        run: |
          taskcat lint

      - name: Run infrastructure deployment test
        run: |
          taskcat test run --test-names minimal-nginx

      - name: Upload TaskCat results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: taskcat-results
          path: taskcat_outputs/
